</div>
<br>
<div class="aktuality_clanky" style="display: block;">


    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-19" class="aktuality_button" />
        <label class="btn" for="aktuality_button-19">
            <div class="clanok1">
                <h3>Záver sezóny 2021/2022</h3>
                <p>Na záver sezóny sme sa zúčastnili Opátske Cupu, turnaja pre mužstva miniligy, kde sme si ešte pred
                    letom zahrali zopár zápasov a skončili sme v stredných priečkach. Pred turnajom sme ešte odohrali aj
                    posledné kolo miniligy, v ktorom sa nám podarilo vo vyrovnanom zápase zdolať tím Stanica Košice v
                    pomere 8:4.
                    Góly strieľali Jakub Čirip 4, Martin Šoltés 2, Matej a Erik Drobňák 1
                    Touto výhrou sme si zabezpečili celkové 5. miesto spomedzi 16 tímov našej ligy. Sme radi za tento
                    výsledok a veríme, že sa budeme aj naďalej zlepšovať. Teraz nás už čaká letný oddych a neskôr
                    príprava na novú sezónu.
                    FS Kerestur ⚽️⚽️⚽️
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-18" class="aktuality_button" />
        <label class="btn" for="aktuality_button-18">
            <div class="clanok2">
                <h3>1.6.2022 &nbsp Miniliga 20.kolo</h3>
                <p>
                    V 20 kole sme hrali proti tímu Smečka a tešili sme sa na napínavý zápas. Úvod zápasu sa rozbehol
                    svižne, keď sa nám podarilo skórovať už v tretej minúte. Odvety sme ale akoby stratili dych a súper
                    o chvíľu vyrovnal. Vzápätí opäť skóroval Jakub Čirip, no my sme sa neprebrali a ťažko sa nám
                    kombinovalo. Súper si tlakom vytvoril množstvo šancí a do polčasu otočil stav na 2:3.
                    V druhom polčase pokračoval náš nevýrazný výkon a aktívny súper nás za to trestal gólmi. Po 10
                    minútach bol stav už hrozivých 2:6. Následne tempo zápasu kleslo a tak sme sa aj my dostali do
                    príležitostí. Chceli sme zápas aspoň zdramatizovať a postupne sa nám to aj darilo. Jeden gól pridal
                    Matej Drobňák, neskôr Kevin Novák a aj Patrik Vaško. Na konci zápasu sme mali veľkú príležitosť na
                    vyrovnanie no bohužiaľ sa nám nepodarilo umiestniť loptu do odkrytej brány. Z následného protiútoku
                    sme dostali 7 gól a bol to koniec rušného zápasu. Prehra 5:7 nás veľmi mrzí, ale musíme sa zlepšiť v
                    našej disciplinovanosti počas zápasu, aby sme takéto zápasy mohli vyhrať.
                    Góly: 2 Jakub Čirip, 1 Kevin Novák, 1 Patrik Vaško, 1 Matej Drobňák
                    <br>
                    <img src="images/articles/2022_06_01/1_6_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-17" class="aktuality_button" />
        <label class="btn" for="aktuality_button-17">
            <div class="clanok1">
                <h3>23.5.2022 &nbsp Miniliga 18.kolo</h3>
                <p>Ďalší víkend sa hrala Košická miniliga a na nás čakal ťažký súper BROsport, ktorý je v tabuľke na
                    treťom mieste. Úvod zápasu sa rozbiehal a súper na nás vyvíjal tlak. Po jednej z chýb sme prvý krát
                    inkasovali. Neskôr sme sa rozbiehali aj my, kedy Matej Drobňák trafil brvno. Vyrovnať sa podarilo
                    Jakubovi Čiripovi po akcii s Matejom Drobňákom. Prvý polčas nebol z našej strany ideálny, no
                    podarilo sa nám udržať remízový stav.
                    V druhom polčase sa nám už hralo lepšie. Do vedenia nás poslal Matej Drobňák, ktorému asistoval
                    Jakub Čirip. Naše vedenie však natrvalo dlho. Súper nás zatlačil a podarilo sa mu skórovať do
                    prázdnej brány. Nás to ale nezlomilo a už o chvíľu na to vysunul Kevin Novák Jakuba Čiripa, ktorý v
                    úniku skóroval na 3:2. To nás opäť nakoplo a Matej Drobňák sa pri napádaní súpera dokázal sám
                    presadiť. Do odkrytej brány umiestnil loptu pekným "lobom" aj Erik Drobňák. Na konci zápasu po úniku
                    zavŕšil svoj hetrik Matej Drobňák.
                    Sme veľmi radi, že sa nám podarilo zvládnuť náročný zápas a v druhom polčase preklopiť víťazstvo na
                    našu stranu⚽️
                    Výsledok: 6:2
                    Góly: 3 Matej Drobňák, 2 Jakub Čirip, 1 Erik Drobňák
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-16" class="aktuality_button" />
        <label class="btn" for="aktuality_button-16">
            <div class="clanok2">
                <h3>10.5.2022 &nbsp Miniliga 17.kolo</h3>
                <p>
                    17. kolo miniligy nám prinieslo zápas proti prvému tímu tabuľky - Som Košičan.
                    Bohužiaľ sme nemali ani jedného hráča na striedačke, a tak sme v pätici museli od začiatku šetriť
                    sily na celý zápas. Od začiatku zápasu sa nám darilo dobre brániť a mali sme viacero dobrých šancí.
                    Skóre otvoril Matej Drobňák, neskôr sa podarilo skórovať aj Erikovi Drobňákovi. Veľké šance mal aj
                    Jakub Čirip, avšak 2 krát trafil iba žrď. Do dobrej príležitosti sa šikovne dostal aj Kevin Novák,
                    ktorý hral výborný zápas, no z blízkosti trafil len do brankára. Prvý polčas tak skončil 2:1. V
                    druhom polčase sme už nemali toľko loptu, pretože nám ubúdali sily. Súperovi sa preto podarilo
                    otočiť stav na 2:3. O chvíľu neskôr sa ale z protiútoku dokázal opäť presadiť Erik Drobňák, ktorý
                    nekompromisne poslal loptu do siete. V samom závere zápasu sme sa snažili urputne brániť remízový
                    stav, ale nemali sme toľko šťastia a súperovi sa podarilo 2 krát skórovať. Mrzí nás táto prehra,
                    pretože sme predviedli poctivý výkon na hranici našich síl, no bez striedania to bolo veľmi ťažké.
                    Góly: 2 Erik Drobňák, 1 Matej Drobňák
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-15" class="aktuality_button" />
        <label class="btn" for="aktuality_button-15">
            <div class="clanok1">
                <h3>2.5.2022 &nbsp Miniliga 16.kolo</h3>
                <p>Ďalší víkend pokračovala miniliga prvým kolom nadstavbovej časti. Hrali sme opäť proti silnému tímu
                    Podpor Pohyb Juniors. V oklepanej zostave so zraneniami sme mali jasnú taktiku, hrať zozadu a
                    poctivo brániť. V prvom polčase sa nám to aj dobre darilo, a tiež sa nám darilo aj využívať rýchle
                    protiútoky. Po jednom z nich Erik Drobňák strelil prvý gól a v druhom protiútoku opečiatkoval žrď.
                    Neskôr súper, ktorý má tím zložený z mladých a rýchlych chlapcov zvýšil aktivitu a vyrovnal na 1:1.
                    No potom sa na druhej strane znova dokázal presadiť Erik Drobňák, ktorý pridal ďalšie dva góly. V
                    druhom polčase nás už súper často krát držal v zovretí, no my sme bojovali ďalej. Presadil sa aj
                    Martin Šoltés, ktorý zvýšil stav na 4:2. Avšak, vedenie sa nám cez veľkú snahu nepodarilo udržať. V
                    závere zápasu za nerozhodného stavu prišli veľké príležitosti na oboch stranách, ale gól už nepadol.
                    V náročnom zápase sa nám tak podarilo uhrať zaslúženú remízu 4:4.
                    V nadstavbovej časti bude už každý zápas náročný a my sa do ďalšieho víkendu budeme snažiť
                    zregenerovať naše zranenia, aby sme na zápas boli pripravený 💪
                    Góly: 3 Erik Drobňák, 1 Martin Šoltés
                    <br>
                    <img src="images/articles/2022_05_02/2_5_2022_1.jpg" alt="8_11_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-14" class="aktuality_button" />
        <label class="btn" for="aktuality_button-14">
            <div class="clanok2">
                <h3>27.4.2022 &nbsp Miniliga 15.kolo</h3>
                <p>
                    V nedeľu sa hralo posledné kolo základnej časti, a proti nám bol veľmi silný tím futsalistov z
                    Podpor Pohyb Košice.
                    V úvode zápasu sme hrali aktívnu hru a tlačili sa do zakončenia. Šance sa nám však nepodarilo
                    využiť, a na to sme doplatili inkasovanými gólmi. Druhý polčas mal podobný priebeh, avšak súper
                    zabral ešte viac a nám sa hralo ťažšie. Z veľkého množstva šancí, ktoré sme počas zápasu mali, sa
                    nám nepodarilo využiť ani jednu. Pri zakončení nám chýbal aj kúsok šťastia a zrejme by sme nedali
                    gól ani do teraz. Preto sme bohužiaľ nešťastne prehrali výsledkom až 0:6.
                    V základnej časti sme tak skončili na 5. mieste a v nadstavbe miniligy budeme hrať s mužstvami z
                    hornej osmičky.
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-13" class="aktuality_button" />
        <label class="btn" for="aktuality_button-13">
            <div class="clanok1">
                <h3>17.4.2022 &nbsp Miniliga 14.kolo</h3>
                <p>Predposledné 14. kolo základnej časti sa odohralo v piatok, kvôli veľkej noci a náš tím sa v ňom
                    stretol s tímom Luník 1. Do zostavy pribudli Richard Rigo a Tomáš Onuščák, a preto sme chceli
                    zabodovať naplno. Začiatok zápasu sa rozbiehal pomaly. Naši chlapci boli aktívnejší, no zakončenia
                    neboli presné. Potom však prišli chvíle Mateja Drobňáka, ktorý sa zmocnil lopty na polovici ihriska,
                    pekne potiahol akciu a nakoniec ju aj gólovo zakončil. Neskôr sa prebudil aj súper, kedy sa mu
                    podarilo na vyrovnanie využiť jednu z nepozornosti v našej obrane. Ku koncu prvého polčasu sa opäť
                    dostal k lopte Matej Drobňák, ktorý vymyslel podobnú akciu ako pri svojom prvom góle a takisto sa mu
                    podarilo skórovať.
                    Počas druhého polčasu sa hra striedala z jednej strany na druhú. Súper z Luníka 1 cítil príležitosť
                    na vyrovnanie. My sme mali tiež viacero dobrých príležitostí, no buď sme triafali brankára, alebo
                    celkom mimo. 5 minút pred koncom sa dokazal po rohovom kope presadiť aj Martin Šoltés. V samo závere
                    zápasu sa ešte súperovi podarilo znížiť na 2:3, no vyrovnať už nestihli.
                    Po kostrbatom výkone tak vyhráme 3:2, keď sme chceli jednoznačne vyhrať, sa nám práve naopak
                    nedarilo, no potiahol nás najmä Matej Drobňák. Počas zápasu sa tiež nepríjemne zranil Erik Drobňák,
                    ktorý nám bude veľmi chýbať. Dúfame, že sa čoskoro uzdraví.
                    Góly: 2 Matej Drobňák, 1 Martin Šoltés
                    Všetkým našim fanúšikom prajeme príjemné, požehnané sviatky.
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-12" class="aktuality_button" />
        <label class="btn" for="aktuality_button-12">
            <div class="clanok2">
                <h3>11.4.2022 &nbsp Miniliga 13.kolo</h3>
                <p>
                    V 13. kole nás čakal súper Furča. Naša zostava bola rovnaká ako minulé kolá - Erik Drobňák, Matej
                    Drobňák, Jakub Čirip, Kevin Novák a Martin Šoltés + Karči zo Selectu v bránke.
                    Zápas začal kľudnou hrou, avšak po chvíli sa objavili menšie roztržky a od tohto momentu začal
                    divoký zápas s množstvom prehnaných reakcií a posmeškov zo strany súpera. My sme sa však chceli
                    sústrediť na svoju hru a v prvom polčase sa podarilo skórovať Jakubovi Čiripovi. V druhom polčase sa
                    opäť hralo ostro, a to z oboch strán. Po chybe brankára sme skórovali druhý krát a snažili sa
                    poctivo brániť útoky súpera. Pred koncom zápasu využil svoju šikovnosť Kevin Novák, ktorý rýchlou
                    rozohrávkou našiel Mateja Drobňáka a ten zasunul loptu do odkrytej brány.
                    Po napínavom zápase tak berieme všetky 3 body po výhre 3:0⚽
                    Góly: 2 Jakub Čirip, 1 Matej Drobňák
                    <br>
                    <img src="images/articles/2022_04_11/11_4_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-11" class="aktuality_button" />
        <label class="btn" for="aktuality_button-11">
            <div class="clanok1">
                <h3>3.4.2022 &nbsp Miniliga 12.kolo</h3>
                <p>Dnes nás čakal "6 bodový" zápas, pretože sme hrali proti súperovi Cukráreň ART, ktorý bol pred týmto
                    zápasom 3 body za nami. Na zápas sme nastúpili v tradičnej zostave, rovnakej ako pred týždňom.
                    Zápas začal opatrnou hrou, no postupne sme si začali vytvárať šance, ktoré sa nám aj rýchlo podarilo
                    premeniť. Museli sme však dávať pozor aj vzadu, lebo protivník hrozil prekvapivými kolmicami na našu
                    bránu. Podarilo sa nám využiť ešte ďalšie šance a prvý polčas skončil výborným výsledkom 4:0.
                    V druhom polčase začal súper viacej behať a to nám robilo niekedy problémy v rozohrávke. Vďaka tomu
                    sa nám, ale vyskytli šance na protiútoky do odkrytej obrany, z ktorých sme skórovali až 5 krát,
                    najmä po pekných prihrávkach Kevina Nováka. Protivníkovi sa podarilo vsietiť 2 góly. Od začiatku
                    zápasu sme si išli za víťazstvom a to sa nám podarilo po výbornom výkone. Celkový výsledok bol 9:2
                    pre nás😁
                    Góly: 5 Jakub Čirip, 2 Matej Drobňák a 2 Erik Drobňák
                    <br>
                    <img src="images/articles/2022_04_03/3_4_2022_1.jpg" alt="8_11_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-10" class="aktuality_button" />
        <label class="btn" for="aktuality_button-10">
            <div class="clanok2">
                <h3>28.3.2022 &nbsp Miniliga 11.kolo</h3>
                <p>
                    Po dlhej dobe od jesene opäť štartuje miniliga a nás na úvod jarnej časti čakal súper z prvého
                    miesta tabuľky - Som Košičan Josta B.
                    Bohužiaľ nás pred zápasom zastihli absencie viacerých dôležitých hráčov ,a tak sme proti silnému
                    tímu nastúpili iba so šiestimi hráčmi.
                    Od úvodu zápasu mal súper miernu prevahu a my sme sa snažili hrať zo zadu. V 5. minúte súper otvoril
                    skóre. My sme však nezložili zbrane a už o chvíľu vyrovnal Erik Drobňák. Neskôr sme sa dopustili
                    niekoľkých chýb, z ktorých sme dvakrát inkasovali. Pred koncom prvého polčasu sa podarilo znížiť na
                    2:3 Jakubovi Čiripovi po peknej akcii s Matejom a Erikom Drobňákom.
                    Druhý polčas mal podobný priebeh. Góly sa striedali na oboch stranách avšak naša obrana bola
                    pevnejšia a znepríjemňovala akcie súpera. Druhým gólom sa presadil Erik Drobňák exportnou strelou z
                    ľavej strany. 6 minút pred koncom za stavu 3:5 potiahol akciu Matej Drobňák, ktorú nakoniec aj sám
                    zakončil a znížil už na jeden gól. Posledných 5 minút pred koncom sme tak stále boli v hre aspoň o
                    remízu a snažili sme sa vypracovať si šance až do úplného konca. Bohužiaľ sa nám už nepodarilo
                    žiadnu šancu premeniť a tak sme prehrali nešťastne 4:5.
                    Teší nás ale to, že proti silnému tímu sme podali dobrý, bojovný výkon. Dúfame, že nabudúce budeme
                    mať v zostave viac hráčov a zápas vyhráme⚽
                    Góly: 2 Erik Drobňák, 1 Matej Drobňák, 1 Jakub Čirip
                </p>
            </div>
        </label>
    </div>


    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-9" class="aktuality_button" />
        <label class="btn" for="aktuality_button-9">
            <div class="clanok1">
                <h3>8.11.2021 &nbsp Miniliga 10.kolo</h3>
                <p>
                    V 10. kole sme sa stretli so súperom Expotech, ktorý nám v tabuľke "dýchal" na chrbát. Od rána
                    sme
                    mali
                    upršané počasie, a tak trocha aj strach, že by hracia plocha mohla byť klzká. Našťastie sa nám
                    pred
                    výkopom
                    počasie zlepšilo a my sme sa mohli naplno sústrediť na zápas. Hralo sa prevažne na jednej
                    polovici,
                    a to
                    súperovej. Na lopte sme boli síce dominantní no aj tak sa nám hralo ťažko. My sme behali a
                    protihráči
                    využívali dlhoročné skúsenosti. Po nepremenených šanciach a pomaly stupňujúcej sa nervozite
                    skóroval
                    Jakub
                    Čirip a strelil tak gól, ktorý bol nakoniec aj rozhodujúci. Týmto zápasom sme ukončili prvú
                    polovicu
                    sezóny.
                    Myslím si, že môžeme byť so svojimi výkonmi spokojní, aj keď stále je, čo zlepšovať. Po 10
                    zápasoch
                    máme
                    7
                    výhier, 1 remízu a 2 prehry so skóre 40:28. Nachádzame sa na 6. mieste s tým, že s 5. a 4.
                    miestom
                    máme
                    narovnako 22 bodov. Najlepší strelec nášho tímu je zatiaľ Jakub Čirip s 12 gólmi. Prvý zápas
                    jarnej
                    časti
                    odohráme 27.3.2022. Teraz nás už čaká zaslúžený oddych a zimná príprava.,
                    <br>
                    <img src="images/articles/8_11_2021.jpg" alt="8_11_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-8" class="aktuality_button" />
        <label class="btn" for="aktuality_button-8">
            <div class="clanok2">
                <h3>31.10.2021 &nbsp Miniliga 9.kolo</h3>
                <p>
                    V 9. kole nás čakal súper Ochranné krídla. Po minulovíkendovej remíze sme mali v hlave len
                    jedno, a
                    to,
                    že
                    musíme bodovať naplno. A, čo sa nám dnes podarilo ? Nastrieľať súperovi až 9 gólov a inkasovať
                    2.
                    Nie je
                    potrebné rozpisovať priebeh zápasu keďže sa vyvíjal celý čas v náš prospech, ako hovorí už aj
                    samotný
                    výsledok. Tentokrát by som chcel pochváliť celé mužstvo, každý jeden hráč sa presadil až na
                    nášho
                    brankára.
                    No jeho by som chcel špeciálne vyzdvihnúť keďže nás aj tento zápas podržal, ako to robí neustále
                    a
                    bez
                    neho
                    by sme nedosahovali tak pozitívne výsledky ako doteraz. Momentálne sa držíme v top 6 (presné
                    umiestnenie
                    zistíme až zajtra) a to je viac ako dosť na následný play-off po sezóne o víťaza ligy. Ďalší
                    víkend
                    nás
                    čaká
                    posledný zápas zimnej časti a my sa budeme pripravovať na tu jarnú.
                    Góly: 2 Richard Berko, 2 Jakub Čirip, 1 Kevin Novák, 1 Martin Šoltés, 1 Patrik Matta, 1 Richard
                    Rigo, 1
                    vlastný gól
                    <br>
                    <img src="images/articles/31_10_2021.jpg" alt="31_10_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-7" class="aktuality_button" />
        <label class="btn" for="aktuality_button-7">
            <div class="clanok1">
                <h3>25.10.2021 &nbsp Miniliga 8.kolo</h3>
                <p>
                    V ďalšom kole miniligy sme sa stretli so súperom Stanica Košice, na ktorého sme pred týmto zápasom
                    strácali
                    3 body. V dobrej zostave sme si verili, že to bude víťazný zápas. Úvod zápasu začal aktívnou hrou a
                    hneď
                    sa
                    nám podarilo skórovať. Po tomto góle sa nám však prestalo dariť v zakončení a množstvo šancí sme
                    nevedeli
                    využiť. Naopak sa z ojedinelých šancí presadil súper a polčas tak skončil 1:1. Druhý polčas mal
                    podobný
                    priebeh, opäť sme sa trápili vo finálnom zakončení, súper sa snažil presadiť z protiútokov a jeden z
                    nich mu
                    aj vyšiel. Následne sa nám podarilo vyrovnať šťastným gólom, kedy prihrávka skončila až v bráne. Ku
                    koncu
                    zápasu vystupňoval náš tlak a súpera sme viac krát pritlačili v obrane. K dispozícii sme mali aj
                    penaltu
                    no
                    ani z toho sa nám už nepodarilo skórovať a tak zápas pre nás skončil nepriaznivou remízou 2:2.
                    V zápase sme ukázali aktívnu hru a veľkú snahu, no musíme sa zlepšiť v zakončení.
                    Góly: 1 Matej Drobňák, 1 Jakub Čirip
                </p>
            </div>
        </label>

        <input type="checkbox" id="aktuality_button-6" class="aktuality_button" />
        <label class="btn" for="aktuality_button-6">
            <div class="clanok2">
                <h3>18.10.2021 &nbsp Miniliga 7.kolo</h3>
                <p>
                    V oklieštenej zostave 5 hráčov sme nastúpili do siedmeho kola proti tímu Luník IX.
                    Zápas sme začali rozvážnou hrou, keďže sme vedeli, že bez striedania si budeme musieť sily rozdeliť
                    na
                    celý
                    zápas. Snažili sme sa kombinovať v zadu a držať loptu. Už po niekoľkých minútach sa nám podarilo
                    presadiť a
                    otvoriť skóre zápasu, no o chvíľu na to sme nepozornosťou v zadu umožnili súperovi vyrovnať. To nás
                    však
                    nezlomilo a na dnešného súpera sme si verili. Zvýšenou útočnou aktivitou a peknými prihrávkami sa
                    nám
                    podarilo opäť skórovať a do polčasu už bol stav 4:1.
                    V druhom polčase na nás súper vybehol a robilo nám to problémy, súper znížil na 4:2. Následne sa
                    šance
                    aj
                    góly striedali na obidvoch stranách a my sme sa snažili udržať si náskok. Ku koncu zápasu pridal
                    ešte
                    Erik
                    Drobňák 2 góly čím definitívne rozhodol o našej výhre pomerom 8:4
                    Góly: Erik Drobňák 4, Jakub Čirip 2, Kevin Novák 1 a Matej Drobňák 1
                    ⚽⚽⚽
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-5" class="aktuality_button" />
        <label class="btn" for="aktuality_button-5">
            <div class="clanok1">
                <h3>11.10.2021 &nbsp Miniliga 6.kolo</h3>
                <p>
                    V šiestom kole nás čakal súper Sporting. Do zápasu sme vstupovali so vztýčenými hlavami, aby sme si
                    napravili chuť po minulovíkendovej prehre. Zápas sme začali vo vysokom tempe. Prvý polčas sme sa
                    trápili.
                    Vytvorili sme si veľké množstvo šancí no súperov brankár exceloval taktiež ako aj ich bránková
                    konštrukcia.
                    Streleckú smolu sa nám podarilo prerušiť v závere prvého polčasu, keď sa presadil Jakub Čirip. Druhý
                    polčas
                    sa veľmi nelíšil od prvého jediná vec, ktorá sa zmenila bol stav. Pridali sme ďalšie 4 góly a
                    podarilo
                    sa
                    nám udržať čistý štít. Počas zápasu sme mali tak organizovanú obranu, že sa super prakticky nevedel
                    ani
                    len
                    dostať k strele na našu bránu. Tento zápas ukázal hlavne našu vytrvalosť a tímovosť. S výsledkom 5:0
                    sme
                    veľmi spokojný a dúfame, že to pôjde takto ďalej.
                    Góly: 3 Jakub Čirip, 1 Patrik Matta, 1 Erik Drobňák

                </p>
                <img id="slider" class="img-thumbnail" src="images/articles/2021_10_11/11_10_2021_1.jpg" width="100%"
                    height="2vh" />
                <div style="text-align: center;">
                </div>
            </div>
        </label>

        <input type="checkbox" id="aktuality_button-4" class="aktuality_button" />
        <label class="btn" for="aktuality_button-4">
            <div class="clanok2">
                <h3>27.9.2021 &nbsp Miniliga 4.kolo</h3>
                <p>
                    Vo štvrtom kole sme hrali proti nepríjemnému súperovi Smečka 22 a očakávali sme vyrovnaný a náročný
                    zápas.
                    Úvod zápasu začal našou aktívnou hrou a tvorením šancí. Po jednej z mnohých akcií sa nám podarilo
                    otvoriť
                    skóre. O niekoľko minút neskôr sa po krásnej akcii s Patrikom Mattom presadil Matej Drobňák.
                    Dôslednou
                    obranou sa nám darilo nepúšťať súpera do veľkých príležitosti.
                    V druhom polčase sa hralo vyrovnane a šance prichádzali z oboch strán. V samom závere zápasu sme
                    strelili aj
                    tretí gól a zápas sme vyhrali 3:0⚽
                    Zo zápasu nás teší dobrá obrana a poctivá hra.
                    Góly: 2 Jakub Čirip, 1 Matej Drobňák
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-3" class="aktuality_button" />
        <label class="btn" for="aktuality_button-3">
            <div class="clanok1">
                <h3>19.9.2021 &nbsp Miniliga 3.kolo</h3>
                <p>
                    V treťom kole košickej miniligy sme si zmerali sily s nováčikom v lige Fc Star. Zápas mal od
                    začiatku svižné tempo a súper na nás vybehol aktívnou hrou v útoku. Po úvodných minútach sme začali
                    hrať aj my a vyrážali do rýchlych protiútokov. Tie sa nám podarilo 4 krát využiť po zakončení Tomáša
                    Onuščaka ktorý ukazoval skvelú formu a potiahol náš Team k dnešnému víťazstvu. Druhý polčas sa súper
                    zlepšil v zakončení z čoho sme niekoľko krát inkasovali avšak vždy sme odpovedali gólom a držali
                    náskok. Zápas sme tak vyhrali v pomere 7:4, keby sme boli viac efektívny v zakončení, výsledok mohol
                    byť ešte krajší, no dôležité je, že máme 3 body. Góly: 4 Tomáš Onuščák, 2 Jakub Čirip, a presadila
                    sa aj naša nová posila Dávid Balog💪
                    FS Kerestur⚽
                </p>
            </div>
        </label>

        <input type="checkbox" id="aktuality_button-2" class="aktuality_button" />
        <label class="btn" for="aktuality_button-2">
            <div class="clanok2">
                <h3>7.9.2021 &nbsp Miniliga 1.kolo</h3>
                <p>
                    V úvodnom kole miniligy 2021/2022 nás čakal súper Podpor pohyb juniors. Tím mladých talentovaných
                    chlapcov z Košíc od úvodu začal aktívnou hrou vďaka čomu sa dostával často do šancí a niektoré z
                    nich aj využil. Naše ojedinelé dobré príležitosti ku skórovaniu skončili na pozornom brankárovi
                    súpera. Po prvom polčase bol tak stav už 0:4.
                    V druhom dejstve sme sa snažili zlepšiť, no v oklieštenej zostave bez viacerých opôr sme nemali
                    dostatok síl. Nepodarilo sa nám ani skórovať, i keď sme mali niekoľko šancí. Výsledok 0:6 je tak pre
                    nás veľmi škaredý, avšak tento zápas nám jasne ukázal v čom sa potrebujeme zlepšiť a do ďalších
                    zápasov pracovať tvrdšie.
                    Fs Kerestur
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-1" class="aktuality_button" />
        <label class="btn" for="aktuality_button-1">
            <div class="clanok1">
                <h3>1.9.2021 &nbsp Uličkový turnaj</h3>
                <p>
                    Náš tím sa v stredu 1.9. zúčastnil turnaja v Malých Ozorovciach. Prvý zápas sme začali slabo a
                    prehrali sme 1:3. Druhý a tretí zapas sme sa už rozbehli a vyhrali v pomere 2:1 a 3:1, a tak sme
                    postupovali z prvého miesta zo skupiny. V semifinále sme začali dobre, keď sme viedli 1:0, no súper
                    nám strelil celkovo 4 góly a my sme sa nevedeli nadýchnuť ku zlešenej hre. Konečný stav bol tak 2:4,
                    čo znamenalo, že sme šli hrať o tretie miesto. V boji o tretie miesto sme v prvom polčase prehrávali
                    už 2:6, ale nevzdali sme sa a snažili sa vyrovnať súper mal však aj viac šťastia a preto konečný
                    stav bol 7:8, tesne sa nám nepodarilo vyrovnať a vynútiť si penaltový rozstrel. Z celkovej hry sme
                    spokojní, len nas mrzí posledný zápas, keď sme mali veľa šancí na vyrovnanie, ktoré sme nedokázali
                    využiť. Zajtra sa nám začína liga a naše mužstvo preverí silný Podpor pohyb juniors.
                    <br>
                    <img src="images/articles/1_9_2021_ulickovy_turnaj.jpg" alt="8_11_2021"
                        class="center img-thumbnail">
                </p>
            </div>
        </label>
