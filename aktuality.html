<div class="aktuality_sezona">
    <h3>Sezóna 2022/2023</h3>
</div>
<br>
<div class="aktuality_clanky" style="display: block;">



    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-8" class="aktuality_button" />
        <label class="btn" for="aktuality_button-8">
            <div class="clanok1">
                <h3>15.11.2022 &nbsp Miniliga 10. a 11. kolo</h3>
                <p>Túto nedeľu prišiel očakávaný posledný zápas jesennej časti súťaže. No najprv chcem spomenúť
                    predchádzajúci zápas, o ktorom sa nepísal článok. Zápas proti súperovi Expotech skončil 3:3, čo nás
                    veľmi mrzí, keďže nám zápas či už po psychickej alebo taktickej stránke nevyšiel a nedokázali sme sa
                    posunúť v tabuľke vyššie. No tento nešťastný zápas sme hodili za hlavu a do posledného, tentokrát
                    ešte dôležitejšieho stretnutia išli s čistými hlavami, úplne pokojní, bez stresu. Naším súperom boli
                    chlapci z tímu Som Košičan Josta B. Očakávali sme kondične ťažší zápas, a tak to nakoniec aj bolo.
                    Zápas pre nás dopadol takmer perfektne. Taktika bola nastavená výborne, striedania takticky sedeli
                    do priebehu hry. Súper nás tlačil celý zápas, my sme sa poctivo bránili a boli sme nebezpeční takmer
                    z každého protiútoku. Naši najlepší strelci sa opäť dokázali niekedy až výstavne presadiť. Erik
                    Drobňák opäť potvrdil svoju celosezónnu formu a skóroval až štyrikrát, góly boli výstavné. Tak isto
                    aj Jakub Čirip, ktorý strelil 2 góly, jeden bol nádherný volej. Chlapcom sa takto darilo aj najmä
                    krásnym asistenciám, kedy sa chlapci (ako aj ja) nezlakomili, neskórovali sami, ale našli ich
                    presnými prihrávkami. Pochvalu si zaslúži aj brankár Dávid Zambori, ktorý nás držal celý zápas a bol
                    nepriestrelný. Zápas skončil 6:1 a gól, ktorý sme inkasovali je chyba mužstva, nie brankára. V
                    zhrnutí si pochvalu zaslúži celé mužstvo. Každý jeden z nás dal do toho všetko, boli sme zodpovední
                    a hlavne nápomocní jeden druhému. Tento zápas bol jednoznačne najlepší zápas tejto polovice sezóny.
                    Keď sa spätne pozrieme na priebeh jesennej časti, tak to určite nebolo dokonalé. Až do posledného
                    zápasu sme hľadali tú správnu taktiku. Všetci máme pocit, že posledný zápas to bolo ideálne
                    nastavené a mali by sme v tom pokračovať. Nachádzame sa na 7. mieste, čo je výborné , keďže sme v
                    elitnej 8čke tabuľky a na TOP 3 strácame len 3 body. Naši najlepší strelci po 11 zápasoch sú Erik
                    Drobňák (18 gólov) a Jakub Čirip (17 gólov). Erik sa nachádza v tabuľke strelcov na 3. mieste a
                    Jakub hneď za ním na 5. mieste. Ako nám ukázali zápasy, je čo zlepšovať a my na to máme veľa času.
                    Počas prestávky sa zúčastníme niekoľkých turnajov, aby sme sa začali jarnú časť oveľa lepšie ako
                    jesennú.
                    Som Košičan Josta B 1:6 FS Kerestur
                    Zostava: Jakub Čirip, Erik Drobňák, Matej Drobňák, Kevin Novák, Patrik Matta, Martin Šoltés, Dominik
                    Kolárčik
                    Brankár: Dávid Zambori
                    Góly: Erik Drobňák 4 , Jakub Čirip 2
                    <br>
                    <img src="images/articles/2022_11_15/15_11_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-7" class="aktuality_button" />
        <label class="btn" for="aktuality_button-7">
            <div class="clanok2">
                <h3>1.11.2022 &nbsp Miniliga 9.kolo</h3>
                <p>
                    V ďalšom kole nás čakal súper z chvosta tabuľky Ochranné krídla. Aj napriek tejto skutočnosti sme
                    súpera nepodcenili a do zápasu sme išli s plným nasadením. Vývoj zápasu netreba dopodrobna
                    rozpisovať, keďže sme dominovali počas jeho celého trvania. Podarilo sa nám streliť 5 gólov, z toho
                    jeden bol opäť výstavný v podaní Erika Drobňáka, ktorý poslal na bránu nechytateľnú strelu ako z
                    dela skoro z polovice ihriska. No na druhej strane nás opäť mrzí to, že sme si nedokázali udržať
                    čisté konto. V zápase sa taktiež prihodilo nepríjemne zranenie Kevinovi Novákovi, ktorý nemohol
                    ďalej pokračovať kvôli oku, no našťastie je už v poriadku. Do konca jesennej časti nám ostávajú ešte
                    2 dôležité zápasy, ktoré potrebujeme vyhrať, aby sme nesklamali a umiestnili sa vysoko v tabuľke.
                    Zostava: Jakub Čirip, Erik Drobňák, Matej Drobňák, Patrik Vaško, Kevin Novák, Patrik Matta, Martin
                    Šoltés, Dominik Kolárčik
                    Brankár: Dávid Zambori
                    Góly: Erik Drobňák 2, Jakub Čirip 2, Matej Drobňák 1
                    <br>
                    <img src="images/articles/2022_10_07/7_10_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-6" class="aktuality_button" />
        <label class="btn" for="aktuality_button-6">
            <div class="clanok1">
                <h3>27.10.2022 &nbsp Miniliga 8.kolo</h3>
                <p>V nedeľu sme sa stretli so súperom Stanica Athletico B, ktorému sa v lige veľmi nedarí a podarilo sa
                    im zatiaľ získať len 1 bod. Súpera sme nechceli aj napriek tejto skutočnosti podceniť a do zápasu
                    sme išli skoro v plnej sile. So súperom sme nemali skoro žiadne problémy a hneď od začiatku zápasu
                    sme na nich pritlačili. Vývoj prvého polčasu sa zhodoval s druhým a v zápase neprišlo k žiadnemu
                    prekvapeniu. Podarilo sa nám skórovať 6 gólov a po dlhom čase aj udržať čisté konto. Erikovi
                    Drobňákovi sa v posledných minútach podarilo skompletizovať hetrik a svoj premiérový gól si pripísal
                    aj Tomáš Onuščak. Zlepšenie v našej hre bolo badateľné, no stále to nie je dokonalé a je čo
                    vylepšovať.
                    Zostava: Jakub Čirip, Tomáš Onuščak, Erik Drobňák, Matej Drobňák, Patrik Vaško, Kevin Novák, Patrik
                    Matta, Martin Šoltés
                    Tréner: Maroš Rudľai
                    Brankár: Dávid Zambori
                    Góly: Erik Drobňák 3, Jakub Čirip 2, Tomáš Onuščak 1
                    <br>
                    <img src="images/articles/2022_10_27/27_10_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-5" class="aktuality_button" />
        <label class="btn" for="aktuality_button-5">
            <div class="clanok2">
                <h3>18.10.2022 &nbsp Miniliga 7.kolo</h3>
                <p>
                    Túto nedeľu sa na nás chystal súper Luník IX a my sme išli do zápasu s jasným cieľom, neprehrať
                    zápas a začať šnúru víťazných zápasov. Do zápasu sme nastupovali skoro v kompletnej zostave, čo nám
                    aj celkom prialo. Na súpera sme začali tlačiť hneď od začiatku a nepúšťali sme ho takmer k ničomu no
                    presadiť sa nám nedarilo. V prvom polčase sa nám po dlhodobom tlaku podarilo nakoniec streliť 2
                    góly, mohlo ich byť pokojne aj viac no bohužiaľ naša koncovka v tomto zápase bola veľmi biedna
                    hlavne pred bránou súpera. Druhý polčas sa opäť zápas vyvíjal v náš prospech, aj keď koncovku sa nám
                    nepodarilo zlepšiť. Súperovi sa nám podarilo streliť 3 góly, jeden výstavný padol zo strely Erika
                    Drobňáka, ktorému sa podarilo streliť gól z veľkej diaľky, konkrétne z našej polovice. Súperovi sa
                    podarilo po našej nepozornosti v obrane streliť jeden gól, čo nás veľmi mrzí keďže sme si opäť
                    nedokázali udržať čisté konto, no veľmi sa tešíme z troch bodov. Strelecké turfy mal opäť obuté
                    Jakub Čirip, ktorý už druhý zápas v rade dokázal streliť súperovi 3 góly. Naše postavenie v tabuľke
                    sa zlepšuje zo zápasu na zápas no pred nami je ešte veľa práce a taktiež aj veľa veci, ktoré treba
                    vykresať.
                    Zostava: Jakub Čirip, Tomáš Onuščak, Erik Drobňák, Dominik Kolarčik, Kevin Novák, Matej Drobňák,
                    Patrik Matta, Matúš Karchnák
                    Brankár: Dávid Zambori
                    Góly: Jakub Čirip 3, Erik Drobňák 1, Kevin Novák 1
                    Fotograf: Jakub Kačmarík
                    <br>
                    <img src="images/articles/2022_10_18/18_10_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-4" class="aktuality_button" />
        <label class="btn" for="aktuality_button-4">
            <div class="clanok1">
                <h3>12.10.2022 &nbsp Miniliga 6.kolo</h3>
                <p>Ďalšia nedeľa a s ňou prišiel aj ďalší zápas, na ktorý sme sa nevedeli dočkať kvôli predchádzajúcemu
                    výsledku. Našim súperom bol Sporting Slovaktech B. Do zápasu sme nastúpili nabudení a plní očakávaní
                    a taktiež v dostatočnom počte. Zápas sa ihneď začal našou dominanciou kedy sa nám veľmi rýchlo
                    podarilo streliť prvý gól a následne aj druhý. Vyzeralo to na veľmi jednoduchý zápas no opak bol
                    pravdou. Prvé striedania, ktoré sme vykonali boli takticky nesprávne a kvôli našej
                    nedisciplinovanosti sme ihneď inkasovali dva góly. Následne nám súper vsietil aj tretí gól a na
                    našej strane sa začala zvyšovať nervozita. Skóre sa nám podarilo vyrovnať na 3:3 no s našou hrou
                    nebolo niečo v poriadku a potrebovalo to zmenu. Cez polčas sme sa snažili prekopať taktiku, aby sme
                    zápas dotiahli do úspešného konca. Súper bol neoblomný a podarilo sa mu vsietiť nám ešte jeden gól,
                    ale nám sa zasa podarilo vyrovnať. Nakoniec sme sa vzchopili a zápas zakončili dvoma gólmi, ktoré
                    nám zabezpečili výhru 6:4. Hrdinom zápasu bol jednoznačne Jakub Čirip, ktorý dokázal prekonať
                    súperovho brankára až štyri krát. Náladu sa nám výhrou podarilo zlepšiť no stále potrebujeme
                    zapracovať na defenzívnej stránke hry keďže inkasujeme veľa gólov.
                    Zostava: Jakub Čirip, Tomáš Onuščák, Mário Tokár, Martin Šoltés, Erik Drobňák, Patrik Vaško, Patrik
                    Matta, Kevin Novák
                    Brankár: Dávid Zambori
                    Góly: Jakub Čirip 4, Patrik Vaško 1, Kevin Novák
                    <br>
                    <img src="images/articles/2022_10_12/12_10_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-3" class="aktuality_button" />
        <label class="btn" for="aktuality_button-3">
            <div class="clanok2">
                <h3>7.10.2022 &nbsp Miniliga 5.kolo</h3>
                <p>
                    Uplynulú nedeľu sme hrali proti tímu BROsport a zápas nám vôbec nevyšiel. Súper hral veľmi dobre a
                    nás trápili zranenia, takže sme boli v malo počte. Prvý polčas nám súper udelil 2 góly, no hra bola
                    ešte vcelku vyrovnaná a mohli sme aj my skórovať. V druhom polčase pri snahe o vyrovnanie sme sa
                    dopustili viacerých chýb a z toho vznikali veľké diery v našej obrane čo protivník využil na
                    skórovanie. Oslabený sme už nemali síl na lepšie bránenie a nakoniec sme prehrali vysoko 0:8. Súper
                    proti nám podal stopercentný výkon. Veľmi sme sa za tento výsledok hanbili, ale na druhej strane nám
                    to ukázalo kde sa máme zlepšiť v hernej činnosti a tiež je kľúčová aj dochádzka hráčov.
                    Najbližšie hráme opäť v nedeľu s chuťou napraviť pokazený zápas z minulého kola;)
                    <br>
                    <img src="images/articles/2022_10_07/7_10_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-2" class="aktuality_button" />
        <label class="btn" for="aktuality_button-2">
            <div class="clanok1">
                <h3>28.9.2022 &nbsp Miniliga 4.kolo</h3>
                <p>V nedeľu nás čakal ďalší súper Smečka. Do zápasu sme nastupovali nie v stopercentnej fyzickej
                    kondícii či už kvôli chorobám, ktoré nás postihli v tomto období alebo zraneniam z predchádzajúcich
                    zápasov. Začiatok zápasu sme vôbec nezvládli, keď sme hneď v úvode prvého polčasu inkasovali gól. Na
                    to nám super vsietil hneď ďalší a naša psychika bola na tenkom ľade. Aby toho nebolo malo prišiel aj
                    tretí a my sme vedeli, že je s našou hrou niečo zle a potrebujeme ju trocha upraviť. Šťastie stalo
                    na našej strane a my sme dokázali pred koncom prvého polčasu znížiť na 1:3 zásluhou Jakuba Čiripa,
                    čo nám veľmi pomohlo pred polčasovou pauzou. Počas pauzy sme si povedali, čo je zle, čo treba
                    zlepšiť, ale hlavne treba udržať psychicky pokoj a zápas sa zlomí v náš prospech. Naše slova sa hneď
                    prejavili začiatkom druhého polčasu kedy sme si začali vytvárať šance a zneisťovali sme aj súpera.
                    Následne prišiel druhý gól, ktorý vsietil Erik Drobňak a super sa úplne zložil po psychickej
                    stránke. Následne sa nám podarilo streliť ďalšie 3 góly hlavne kvôli našej zodpovednosti a neistote
                    súpera. Tento zápas nám ukázal aká je dôležitá disciplína a zodpovedný prístup. Konečný výsledok
                    zápasu 5:3.
                    Góly : Jakub Čirip 2, Erik Drobňák 3
                    Zostava : Brankár : David Zambori
                    Hráči : Jakub Čirip, Erik Drobňák, Matej Drobňák, Kevin, Novák, Martin Šoltés, Dominik Kolarčik,
                    Patrik Matta
                    <br>
                    <img src="images/articles/2022_09_28/28_9_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-1" class="aktuality_button" />
        <label class="btn" for="aktuality_button-1">
            <div class="clanok2">
                <h3>14.9.2022 &nbsp Miniliga 2.kolo</h3>
                <p>
                    V nedeľu sme si zmerali sily s tímom Vibe. Do zápasu sme išli nabudení, plní očakávaní a nastavení
                    nepodceniť súpera. Počasie nám vôbec neprialo keďže počas celého zápasu husto pršalo. S touto
                    skutočnosťou sme sa zmierili a vyštartovali do zápasu v plných obrátkach. Tvrdý štart sa nám hneď aj
                    vyplatil, keď sa Jakubovi Čiripovi podarilo otvoriť skóre. Hneď na to pridal ďalší gól Matej
                    Drobňák. Súpera sme nepúšťali do ničoho a hrali sme si len svoju hru. Druhý polčas sa odohrával v
                    úplne rovnakom scenári kedy sme my tlačili a súper len bránil. Dokázali sme pridať ešte 3 góly z
                    pekných akcií. Autori nasledujúcich 3 gólov boli Erik Drobňák, Matej Drobňák a Jakub Čirip. Zápas sa
                    dohrával za hustého dažďa a to ovplyvnilo aj viditeľnosť. Výsledok nás samozrejme teší no sezóna sa
                    ešte len pomaly rozbieha a my musíme byť koncentrovaní aj na ďalšie zápasy. Túto sezónu máme
                    stanovené vysoké ciele, ktoré je možné naplniť len tvrdou prácou a zodpovedným prístupom.
                    Zostava:
                    Hráči: Erik Drobňák, Matej Drobňák, Jakub Čirip, Patrik Matta, Kevin Novák, Dominik Kolarčik
                    Brankári: David Zambori, Peter Haky
                    Góly: Erik Drobňák 1, Matej Drobňák 2, Jakub Čirip 2
                    Výsledok: FS Kerestur 5:0 Vibe
                    <br>
                    <img src="images/articles/2022_09_14/14_9_2022_1.jpg" alt="" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>
