---
layout: default
title: Blog
---

<section id="blog-page">
  <h2>All Blog Posts</h2>
  <p><a href="/">← Back to Home</a></p>

  <ul>
    {% for post in site.posts %}
      <li>
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <small>{{ post.date | date: "%B %d, %Y" }}</small>
        <p>{{ post.excerpt | strip_html | truncatewords: 40 }}</p>
      </li>
    {% endfor %}
  </ul>
</section>
