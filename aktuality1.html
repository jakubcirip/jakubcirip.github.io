<div class="aktuality_sezona">
    <h3>Sezóna 2020/2021</h3>
</div>
<br>
<div class="aktuality_clanky" style="display: block;">


    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-1" class="aktuality_button" />
        <label class="btn" for="aktuality_button-1">
            <div class="clanok1">
                <h3>Záver sezóny 2020/2021</h3>
                <p>Nedeľňajší zápas sa začal vo veľmi horúcom počasí, a tak sme vedeli, čo od toho očakávať. Súper
                    prišiel s 10 hráčmi a nás bolo len 6. Hralo sa nám ťažko. Bohužiaľ sme mali len jedného hráča na
                    striedanie. Inkasovali sme prvé 2 góly, a tak bol súper v dvojgólovom vedení. No my sme sa
                    nevzdávali a znížili sme na 1:2. Nanešťastie nám dal súper gól do šatne, čo nám trocha zamávalo so
                    psychikou. Na začiatku druhého polčasu sme mali hneď rýchlu akciu, ktorú sme zakončili gólom na 2:3.
                    Na nás doľahla vyčerpanosť, preto sme inkasovali aj štvrtý gól. Do konca zápasu sme sa však vzájomne
                    povzbudili a dokázali sme uhrať aspoň remízu. Konečný stav 4:4. Tento zápas ukončil našu sezónu a
                    nás čaká oddych a príprava na novú. Podarilo sa nám umiestniť na 6. mieste. Síce sme nedosiahli náš
                    cieľ TOP 3 no aj tak sme spokojní a ženie nás to len viac vopred, aby sme sa zlepšovali.
                    Vyjadrenie trénera k sezóne Tomáš Onuščáka : Chcel by som sa prvom rade poďakovať za výbornú sezónu
                    chlapcom. Bojovali v každom zápase naplno. Som rád, že môžem pracovať s takou super partiou . Ďalej
                    by som sa chcel poďakovať Obecnému úradu za podporu, veľmi si to vážime. So sezónou som veľmi
                    spokojný. Túto sezónu sme mali výbornú. Treba popracovať na mužstve, vždy je, čo zlepšovať. Čaká nás
                    pauza jeden a pol mesiaca takže popracuje sa na chybičkách a posnažíme sa lepšie pripraviť na novú
                    sezónu.. Najlepší hráči túto sezónu boli jednoznačne Ondrej Kaduk (brankár) a Jakub Čirip.
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-2" class="aktuality_button" />
        <label class="btn" for="aktuality_button-2">
            <div class="clanok2">
                <h3>9.7.2021 &nbsp Miniliga 12.kolo</h3>
                <p>
                    Minulý víkend sa hralo 12. kolo. Na nás čakal jeden z najťažších zápasov v sezóne proti silnému tímu
                    Podpor pohyb Celtic B. Očakávali sme ťažký zápas a tvrdý boj. V prvom polčase nás súper tlačil, ale
                    aj my sme mali viacero dobrých výpadov a šancí na skórovanie. Súper bol, ale efektívnejší a prvý
                    polčas sme prehrali 1:3, keď v závere polčasu po úniku strelil gól Richard Berko. Po prestávke sme
                    začali odvážne, avšak zanedlho nám došli sily proti nepríjemnemu protivníkovi, ktorý následne využil
                    naše chyby v obrane. Konečný výsledok bol teda 1:7.
                    V zápase môžme ľutovať hlavne to, že sme nedokázali využiť viac našich šancí a výsledok aspoň
                    skorigovať.
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-3" class="aktuality_button" />
        <label class="btn" for="aktuality_button-3">
            <div class="clanok1">
                <h3>22.6.2021 &nbsp Miniliga 11.kolo</h3>
                <p>Keďže sme pred týždňom v nedeľu mali voľno tak sme tento týždeň nastúpili už na 11. kolo. Hrali sme
                    proti Furča FC a zápas sa nám podarilo vyhrať 4:3. Tým, že sa nám zápas podarilo vyhrať tak sa náš
                    tím posunul na 6. miesto so stratou len troch bodov na 3. miesto. Počasie nám prialo až veľmi a
                    hralo sa po veľkej horúčave. Prvý a druhý gól vsietil Richard Rigo no súper sa vrátil do zápasu, keď
                    dokázal skórovať. Následne však Rigo skompletizoval svoj hetrik a my sme si mysleli, že zápas už
                    máme pod kontrolou. Všetko však bolo inak, súper nás prekvapil a dokázal vyrovnať. Za stavu 3:3 sme
                    súpera tlačili no nedarilo sa nám nijako skórovať. Futbal sa však hrá do samého záveru a my sme sa
                    toho aj držali. Posledný gól padol v posledných sekundách zápasu a mali sme pri ňom šťastie v
                    nešťastí. Po Rigovej strele sa lopta odrazila od jednej tyčky do druhej a vyšla z brány no po
                    pohotovom zakončení tejto odrazenej lopty Richardom Berkom nastala na ihrisku veľká radosť a nám sa
                    podarilo zobrať tieto dôležité 3 body. Ďalší týždeň nás čaká zasa prestávka a následne jeden z
                    najdôležitejších zápasov sezóny. FS Kerestur.
                    Góly: Richard Rigo 3, Richard Berko 1
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-4" class="aktuality_button" />
        <label class="btn" for="aktuality_button-4">
            <div class="clanok2">
                <h3>6.6.2021 &nbsp Miniliga 9.kolo</h3>
                <p>
                    Dnes sme nastúpili na zápas 9. kola proti tímu Ochranné krídla a podarilo sa nám ho vyhrať vysoko
                    7:1. Po tomto zápase sa bohužiaľ stále nachádzame na 9. mieste no máme len 1 bodovú stratu na 4.
                    miesto. Tento zápas sme potrebovali vyhrať, ďalšiu prehru sme si nemohli dovoliť hlavne kvôli
                    morálke tímu. Dnes rozhodovali nie len individuálne výkony, ale hlavne tímová práca. Otvárací gól
                    zápasu padol po strele Erika Drobňáka, ktorý sa presadil ešte 2 krát, a tak skompletizoval hetrik.
                    Po našich dvoch góloch sme aj inkasovali no ďalej sa už presadili Martin Šoltés, Richard Berko,
                    Richard Rigo a Patrik Matta a tak zavŕšili dnešné víťazstvo. K dnešnému zápasu netreba viac slov,
                    myslím si, že výsledok hovorí za všetko, aj keď je potrebné zlepšovať ešte veľa vecí. My veríme, že
                    sa dostaneme aspoň do top 4 tímov, no to miesto si treba zaslúžiť a vymakať. FS Kerestur.
                    Góly: Erik Drobňák 3, Martin Šoltés 1, Richard Berko 1, Richard Rigo 1, Patrik Matta 1
                    <br>
                    <img src="images/articles/2021_06_06/6_6_2021_1.jpg" alt="8_11_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>

    <div class="kontainer">
        <input type="checkbox" id="aktuality_button-5" class="aktuality_button" />
        <label class="btn" for="aktuality_button-5">
            <div class="clanok1">
                <h3>30.5.2021 &nbsp Miniliga 8.kolo</h3>
                <p>Vo 8. kole na nás čakal tím Sporting SLOVAKTECH B, zápas pre nás skončil negatívnym výsledkom 6:3. V
                    tabuľke sme prepadli na 9. miesto. Na zápas sme nastupovali v počte 5 hráčov, čo bol jeden z dôvodov
                    prečo sme dnes nebodovali. Zápas sa hral v oveľa pokojnejšom tempe oproti minulému týždňu no bolo
                    vidieť, že len s 1 hráčom na rotovanie to bude veľmi zložité. Hneď v 1. polčase sme inkasovali 2
                    góly no po premiérovom zásahu Martina Šoltésa, ktorý znížil na 2:1 sme sa trocha vzchopili. Polčas
                    sme dohrávali s loptou v našom držaní, prišli aj šance, ktorých bolo viac než dosť no dnes nám zasa
                    chýbala dobrá koncovka. Ako sa už vo futbale hovorí „Keď nedáš dostaneš,“ a tak sa aj stalo. V
                    úplnom závere prvého polčasu sme inkasovali aj 3. gól. Do 2. polčasu sme nastúpili ako vymenené
                    mužstvo. Prvých 5 minút sa hralo neustále na polovici súpera, nevedeli odtiaľ dostať loptu preč.
                    Brankára sme okopávali zo všetkých strán no nepodarilo sa nám ho za nič prekonať. No následne však
                    prišiel rohový kop, po ktorom pretlačil loptu do siete Maroš Rudľai. Po 5 minútach tlaku na nás
                    doľahla únava a hra sa zasa točila z jednej strany na druhú. V závere mal súper samostatný nájazd na
                    našu bránu, brankár sa ho snažil odzbrojiť no nepodarilo sa mu to čisto, a tak hrali sme o jedného
                    menej. Súper nám následne strelil po štandardke 4. gól, následne 5. a my sme už nedokázali so
                    zápasom nič spraviť. Ešte symbolicky gól po krásnom samostatnom prieniku vsietil Jakub Čirip no
                    zápas už bol na konci. Zo zápasu si odnášame zranenia a hlavne veľa vecí, na ktorých treba
                    zapracovať. Veríme, že o týždeň to bude lepšie, aj keď bez niekoľkých opôr tímu. FS Kerestur.
                    Góly: Martin Šoltés 1, Maroš Rudľai 1, Jakub Čirip 1
                </p>
            </div>
        </label>
        <input type="checkbox" id="aktuality_button-6" class="aktuality_button" />
        <label class="btn" for="aktuality_button-6">
            <div class="clanok2">
                <h3>23.5.2021 &nbsp Miniliga 7.kolo</h3>
                <p>
                    V 7. kole sme sa predstavili proti tímu Som Košičan Josta B, zápas sme prehrali 4:3. Pred týmto
                    zápasom sme sa nachádzali na 6. pozícií s 12 bodmi a náš súper na 3. s 13 bodmi, takže sme vedeli, o
                    čo hráme. Zápas sa začal vo vysokom tempe a my aj keď po niekoľko mesačnej pauze a oddychu sme
                    dokázali nájsť vzájomnú súhru a zatlačiť súpera. Zápas bol vyrovnaný a rozhodovali hlavne
                    individuálne chyby, nedostatočná zápasová prax a nepremenené šance. Prvý gól sme inkasovali po
                    neprebratí súperovho hráča, ktorý mal gól ako na zlatom podnose. Následne sme odpovedali po
                    pohotovej strele Erika Drobňáka. V nastolenom tempe sa pokračovalo, keď nám súper vstrelil gól na
                    2:1 a my sme odpovedali gólom Matúša Karchňáka, následne sme zasa inkasovali a aj odpovedali ďalším
                    gólom Matúša, no po inkasovaní 4. gólu sme sa už nedokázali presadiť a bohužiaľ sa nám nepodarilo v
                    tabuľke posunúť na 3. miesto. Veľké pozitívum zápasu bol náš brankár Ondrej Kaduk, ktorý predvádzal
                    fantastické zákroky a držal tak tím nad vodou. Zo zápasu si berieme cenné skúsenosti a ďalší týždeň
                    už budeme lepšie pripravení. Ďakujeme a vážime si vašu podporu. FS Kerestur.
                    Góly: Erik Drobňák 1, Matúš Karchňák 2
                    <br>
                    <img src="images/articles/2021_05_23/23_5_2021_1.jpg" alt="8_11_2021" class="center img-thumbnail">
                </p>
            </div>
        </label>
    </div>
